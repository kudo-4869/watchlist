name: تحديث يومي (Daily Update)

on:
  schedule:
    # 03:00 UTC ≈ 06:00 بتوقيت السعودية/الإمارات. عدّل الرقم إذا تبغى توقيت مختلف.
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        run: node scripts/update.mjs

      - name: Commit catalog if changed
        run: |
          git config user.name "watchlist-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/catalog.json
          git diff --cached --quiet || git commit -m "تحديث تلقائي: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
