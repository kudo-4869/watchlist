<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أرشيفي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14151A; --surface:#1C1E25; --surface2:#252832; --line: rgba(255,255,255,.09);
    --text:#F2F0E9; --muted:#92959f; --muted2:#5d6070;
    --series:#E3B23C; --movie:#36C2B4; --anime:#E2683B; --play:#8C7AE6;
    --story:#D6608A; --game:#6FBF73; --cartoon:#4FA8E0;
    --danger:#D85C5C; --good:#5FB87A; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  a{color:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:8px;}

  #compatBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:80;background:#3a2230;border-bottom:1px solid var(--danger);color:#f4d6d6;font-size:13px;padding:10px 16px;text-align:center;}
  #compatBanner a{color:var(--series);font-weight:700;text-decoration:underline;}

  #app{display:flex;min-height:100vh;}
  .sidebar{width:240px;flex:none;background:var(--surface);border-left:1px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{display:flex;align-items:center;gap:10px;padding:0 4px;}
  .brand-mark{width:30px;height:30px;flex:none;}
  .brand h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.2px;}
  .brand span{display:block;font-size:11px;color:var(--muted2);font-weight:400;margin-top:1px;}

  .nav{display:flex;flex-direction:column;gap:4px;}
  .nav-divider{height:1px;background:var(--line);margin:4px 2px 8px;}
  .nav button{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--muted);text-align:right;transition:.15s;}
  .nav button .dot{width:8px;height:8px;border-radius:50%;background:var(--muted2);flex:none;}
  .nav button:hover{background:var(--surface2);color:var(--text);}
  .nav button.active{background:var(--surface2);color:var(--text);}
  .nav button.active .dot{background:var(--accent-color,var(--series));}
  .nav button .count{margin-right:auto;font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted2);}

  .sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:8px;}
  .check-status{font-size:11.5px;color:var(--muted2);padding:10px 12px;background:var(--surface2);border-radius:10px;line-height:1.7;}
  .check-status b{color:var(--muted);font-weight:600;}
  .check-status .repo-link{color:var(--series);cursor:pointer;font-weight:600;}
  .ghost-btn{font-size:13px;color:var(--muted2);padding:8px 12px;border-radius:10px;border:1px dashed var(--line);text-align:center;transition:.15s;width:100%;}
  .ghost-btn:hover{color:var(--text);border-color:var(--muted2);}
  .ghost-btn.danger:hover{color:var(--danger);border-color:var(--danger);}
  .ghost-btn.warn{border-color:var(--series);color:var(--series);}

  .main{flex:1;min-width:0;padding:24px 32px 60px;}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;gap:16px;flex-wrap:wrap;}
  .topbar h2{font-size:24px;margin:0 0 4px;font-weight:800;}
  .topbar p{margin:0;color:var(--muted2);font-size:13px;}
  .actions{display:flex;gap:10px;}
  .btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:700;transition:.15s;}
  .btn-primary{background:var(--series);color:#1a1305;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--line);}
  .btn-secondary:hover{background:#2e313c;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .spin{display:inline-block;width:13px;height:13px;border-radius:50%;border:2px solid currentColor;border-left-color:transparent;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .coll-chips{display:none;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .coll-chip{padding:6px 14px;border-radius:20px;font-size:12.5px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);}
  .coll-chip.sel{background:var(--movie);color:#0d2826;border-color:transparent;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:18px;}
  .card{background:var(--surface);border-radius:var(--radius);overflow:hidden;position:relative;transition:transform .15s, box-shadow .15s;border:1px solid var(--line);}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 24px -10px rgba(0,0,0,.6);}
  .poster{aspect-ratio:2/3;background:var(--surface2) center/cover no-repeat;position:relative;display:flex;align-items:center;justify-content:center;}
  .poster.no-img::after{content:'🎬';font-size:30px;opacity:.35;}
  .type-chip{position:absolute;top:8px;right:8px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;color:#10110f;z-index:2;}
  .news-dot{position:absolute;top:8px;left:8px;width:9px;height:9px;border-radius:50%;background:var(--anime);box-shadow:0 0 0 3px rgba(226,104,59,.25);z-index:2;}
  .status-badge-onposter{position:absolute;bottom:7px;left:7px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;z-index:2;backdrop-filter:blur(2px);}
  .quick-actions{position:absolute;bottom:7px;right:7px;display:flex;gap:5px;z-index:2;}
  .qa-btn{width:25px;height:25px;border-radius:50%;background:rgba(10,11,14,.78);border:1px solid var(--line);color:var(--muted);font-size:12.5px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);line-height:1;}
  .qa-btn:hover{background:rgba(10,11,14,.92);color:var(--text);}
  .qa-btn.qa-active{border-color:transparent;}
  .qa-btn.qa-active[data-qa="completed"]{background:var(--good);color:#0d130f;}
  .qa-btn.qa-active[data-qa="dropped"]{background:var(--danger);color:#fff;}
  .perf{height:1px;position:relative;background:repeating-linear-gradient(to left,var(--line) 0 6px,transparent 6px 12px);margin:0 10px;}
  .perf::before,.perf::after{content:'';position:absolute;top:-7px;width:14px;height:14px;border-radius:50%;background:var(--bg);}
  .perf::before{right:-17px;} .perf::after{left:-17px;}
  .stub{padding:10px 12px 12px;}
  .stub .title{font-size:13.5px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:35px;}
  .stub .meta-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .stub .year{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono';}
  .wstatus{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--muted);}
  .season-line{font-size:10.5px;color:var(--muted2);font-family:'JetBrains Mono';margin-top:5px;}
  .coll-line{font-size:10px;color:var(--movie);margin-top:3px;font-weight:600;}
  .progress-bar{height:4px;border-radius:4px;background:var(--surface2);margin-top:6px;overflow:hidden;}
  .progress-bar > div{height:100%;border-radius:4px;}

  .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted2);}
  .empty .big{font-size:32px;margin-bottom:10px;}
  .empty p{margin:4px 0;font-size:14px;}

  .overlay{position:fixed;inset:0;background:rgba(8,9,12,.72);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;opacity:0;pointer-events:none;transition:.15s;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .modal{background:var(--surface);border-radius:18px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;border:1px solid var(--line);transform:translateY(8px);transition:.15s;}
  .overlay.show .modal{transform:translateY(0);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:2;}
  .modal-head h3{margin:0;font-size:17px;}
  .modal-body{padding:20px;}
  .x-btn{font-size:18px;color:var(--muted);padding:4px;border-radius:8px;}
  .x-btn:hover{color:var(--text);background:var(--surface2);}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:600;}
  .field input[type=text],.field input[type=password],.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:10px;font-size:14px;font-family:inherit;}
  .field textarea{resize:vertical;min-height:60px;}
  .hint{font-size:12px;color:var(--muted2);line-height:1.6;margin:0 0 14px;}
  .hint a{color:var(--series);text-decoration:underline;}
  .type-pick{display:flex;gap:8px;flex-wrap:wrap;}
  .type-pick button{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--line);color:var(--muted);}
  .type-pick button.sel{color:#10110f;border-color:transparent;}
  details.adv{margin:6px 0 14px;}
  details.adv summary{font-size:12.5px;color:var(--muted2);cursor:pointer;}
  details.adv > div{margin-top:10px;}

  .detail-top{display:flex;gap:16px;padding:20px;}
  .detail-poster{width:110px;flex:none;aspect-ratio:2/3;border-radius:10px;background:var(--surface2) center/cover no-repeat;}
  .detail-info h3{margin:0 0 4px;font-size:18px;}
  .detail-info .sub{font-size:12.5px;color:var(--muted2);margin-bottom:8px;font-family:'JetBrains Mono';}
  .detail-info p{font-size:13.5px;color:var(--muted);line-height:1.6;margin:0;}
  .status-pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;margin-top:8px;}

  .tabs{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .tabs button{padding:10px 14px;font-size:13.5px;font-weight:600;color:var(--muted2);border-bottom:2px solid transparent;white-space:nowrap;}
  .tabs button.active{color:var(--text);border-color:var(--series);}
  .tab-panel{padding:18px 20px;}
  .tab-panel.hidden{display:none;}

  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper button{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:1px solid var(--line);font-size:16px;font-weight:700;}
  .stepper button:hover{background:#2e313c;}
  .stepper .val{min-width:38px;text-align:center;font-family:'JetBrains Mono';font-weight:700;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .rate-row{display:flex;gap:6px;flex-wrap:wrap;}
  .rate-row button{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:1px solid var(--line);font-size:12.5px;font-family:'JetBrains Mono';}
  .rate-row button.sel{background:var(--series);color:#10110f;border-color:transparent;}

  .news-group{margin-bottom:18px;}
  .news-group h4{font-size:12.5px;font-weight:700;margin:0 0 8px;display:flex;align-items:center;gap:8px;}
  .news-group h4 .bar{width:3px;height:13px;border-radius:2px;}
  .news-item{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:7px;}
  .news-item .d{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono';margin-bottom:3px;}
  .news-item .s{font-size:13px;line-height:1.55;color:var(--text);}
  .news-item .src{font-size:11px;color:var(--muted2);margin-top:4px;}
  .news-item:hover{background:#2e313c;}
  .news-empty{font-size:12.5px;color:var(--muted2);background:none;padding:4px 0 12px;}
  .news-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:11.5px;color:var(--muted2);gap:10px;flex-wrap:wrap;}

  .match-result{display:flex;gap:10px;align-items:center;padding:8px;border-radius:10px;background:var(--surface2);margin-bottom:6px;cursor:pointer;}
  .match-result:hover{background:#2e313c;}
  .match-result img{width:34px;height:48px;object-fit:cover;border-radius:6px;background:#000;flex:none;}
  .match-result .ph{width:34px;height:48px;border-radius:6px;background:var(--surface);flex:none;}
  .match-result .mr-info{flex:1;font-size:12.5px;color:var(--muted);}
  .match-result .mr-info b{display:block;font-size:13px;color:var(--text);}

  .danger-link{color:var(--danger);font-size:13px;font-weight:600;}
  .danger-link:hover{text-decoration:underline;}
  .plain-link{color:var(--series);font-size:13px;font-weight:600;}
  .plain-link:hover{text-decoration:underline;}

  #toasts{position:fixed;bottom:20px;left:20px;z-index:100;display:flex;flex-direction:column;gap:8px;}
  .toast{background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:11px 16px;border-radius:10px;font-size:13.5px;box-shadow:0 8px 20px -8px rgba(0,0,0,.5);animation:in .2s ease;max-width:340px;}
  .toast.error{border-color:var(--danger);}
  .toast.success{border-color:var(--good);}
  @keyframes in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .confirm-box{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:340px;}
  .confirm-box p{font-size:14px;color:var(--muted);line-height:1.6;margin:0 0 16px;}
  .confirm-actions{display:flex;gap:8px;justify-content:flex-end;}

  @media (max-width:720px){
    .sidebar{position:fixed;bottom:0;top:auto;width:100%;height:auto;flex-direction:row;border-left:none;border-top:1px solid var(--line);padding:10px;overflow-x:auto;z-index:20;}
    .brand,.sidebar-bottom{display:none;}
    .nav{flex-direction:row;}
    .nav-divider{display:none;}
    .nav button .count{display:none;}
    .main{padding:18px 14px 90px;}
    .detail-top{flex-direction:column;}
    .detail-poster{width:100%;}
  }
  :focus-visible{outline:2px solid var(--series);outline-offset:2px;}
</style>
</head>
<body>
<div id="compatBanner"></div>

<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 30 30" fill="none">
        <rect x="2" y="5" width="26" height="20" rx="4" fill="#252832" stroke="#E3B23C" stroke-width="1.5"/>
        <circle cx="8" cy="9" r="1.4" fill="#E3B23C"/><circle cx="8" cy="21" r="1.4" fill="#36C2B4"/>
        <circle cx="22" cy="9" r="1.4" fill="#E2683B"/><circle cx="22" cy="21" r="1.4" fill="#8C7AE6"/>
        <path d="M12 11l7 4-7 4z" fill="#F2F0E9"/>
      </svg>
      <div><h1>أرشيفي</h1><span>مكتبتك الشخصية</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-bottom">
      <button class="ghost-btn warn" id="unlockBtnSidebar" style="display:none;">🔒 فتح بياناتي</button>
      <div class="check-status" id="checkStatus">—</div>
      <button class="ghost-btn" id="exportBtn">⬇ تصدير بياناتي</button>
      <button class="ghost-btn" id="importBtn">⬆ استيراد بياناتي</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
      <button class="ghost-btn danger" id="resetBtn">تصفير بياناتي</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h2 id="sectionTitle">الكل</h2>
        <p id="sectionSub">كل ما تتابعه في مكان واحد</p>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="refreshAllBtn">🔄 تحديث الآن</button>
        <button class="btn btn-primary" id="addBtn">＋ إضافة عمل</button>
      </div>
    </div>
    <div class="coll-chips" id="collectionChips"></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<div id="toasts"></div>

<div class="overlay" id="addOverlay"><div class="modal" id="addModal"></div></div>
<div class="overlay" id="detailOverlay"><div class="modal" id="detailModal"></div></div>
<div class="overlay" id="confirmOverlay"><div class="confirm-box" id="confirmBox"></div></div>

<script>
/* ===================== CONFIG ===================== */
const TYPE_LABELS = {series:'مسلسل', movie:'فيلم', anime:'أنمي', cartoon:'كرتون', play:'مسرحية', story:'قصة', game:'لعبة'};
const TYPE_COLORS = {series:'var(--series)', movie:'var(--movie)', anime:'var(--anime)', cartoon:'var(--cartoon)', play:'var(--play)', story:'var(--story)', game:'var(--game)'};
const AUTO_FETCH_TYPES = new Set(['series','movie','anime','cartoon']);
const SEASON_TYPES = new Set(['series','anime','cartoon']);
const STATUS_LABELS = {ongoing:'مستمر', completed:'مكتمل', unclear:'غير منتهي', cancelled:'تكنسل'};
const STATUS_COLORS = {ongoing:'var(--good)', completed:'var(--movie)', unclear:'var(--series)', cancelled:'var(--danger)'};
const WATCH_LABELS = {planning:'مخطط له', watching:'أتابعه الآن', completed:'مكتمل', incomplete:'غير مكتمل', onhold:'متوقف مؤقتًا', dropped:'سحبت عليه'};
const NEWS_LABELS = {season_news:'مواسم جديدة / إلغاء', release_news:'مواعيد العرض والتأجيل', general_news:'أخبار عامة'};
const NEWS_COLORS = {season_news:'var(--anime)', release_news:'var(--movie)', general_news:'var(--play)'};
const REL_LABELS = {Sequel:'تتمة', Prequel:'الجزء السابق', 'Side story':'قصة جانبية', 'Spin-off':'سلسلة فرعية', 'Alternative version':'نسخة بديلة', 'Full story':'القصة الكاملة'};
const SETTINGS_KEY = 'watchlist_settings_v1';
const CACHE_KEY = 'watchlist_userdata_cache_v1';
const PASSPHRASE_SESSION_KEY = 'watchlist_passphrase_v1';

let CATALOG = { updatedAt: null, items: [] };
let LOCAL = { progress:{}, overrides:{}, hidden:{}, readNews:{}, settings:{ repo:'', token:'' } };
let activeSection = 'all';
let activeCollection = null;
let activeDetailId = null;
let activeDetailTab = 'overview';
let activeNewsType = null;
let catalogLoadFailed = false;
let PASSPHRASE = null;
let ENCRYPTION_ACTIVE = false;
let NEEDS_UNLOCK = false;
let RAW_ENCRYPTED_PAYLOAD = null;

/* ===================== SETTINGS (device-local: repo + token) ===================== */
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(raw) LOCAL.settings = Object.assign({repo:'',token:''}, JSON.parse(raw));
  }catch(e){ console.error(e); }
}
function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(LOCAL.settings)); }catch(e){ console.error(e); }
}

/* ===================== ENCRYPTION (Web Crypto, AES-GCM + PBKDF2) ===================== */
function b64FromBytes(bytes){ return btoa(String.fromCharCode(...new Uint8Array(bytes))); }
function bytesFromB64(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
async function deriveKey(passphrase, saltB64){
  const salt = bytesFromB64(saltB64);
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(passphrase), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'}, keyMaterial, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
}
async function encryptUserData(passphrase, dataObj){
  const saltB64 = b64FromBytes(crypto.getRandomValues(new Uint8Array(16)));
  const key = await deriveKey(passphrase, saltB64);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const plaintext = new TextEncoder().encode(JSON.stringify(dataObj));
  const ciphertextBuf = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, plaintext);
  return { encrypted:true, salt:saltB64, iv:b64FromBytes(iv), ciphertext:b64FromBytes(ciphertextBuf) };
}
async function decryptUserData(passphrase, payload){
  const key = await deriveKey(passphrase, payload.salt);
  const iv = bytesFromB64(payload.iv);
  const ciphertext = bytesFromB64(payload.ciphertext);
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(plainBuf));
}
async function tryUnlock(promptedPassphrase){
  const p = promptedPassphrase || prompt('🔒 أدخل كلمة مرور بياناتك:');
  if(!p) return false;
  try{
    const d = await decryptUserData(p, RAW_ENCRYPTED_PAYLOAD);
    LOCAL.progress = d.progress||{}; LOCAL.overrides = d.overrides||{}; LOCAL.hidden = d.hidden||{}; LOCAL.readNews = d.readNews||{};
    PASSPHRASE = p; ENCRYPTION_ACTIVE = true; NEEDS_UNLOCK = false;
    try{ sessionStorage.setItem(PASSPHRASE_SESSION_KEY, p); }catch(e){}
    cacheUserDataLocally();
    renderAll();
    showToast('تم الفتح', 'success');
    return true;
  }catch(e){
    showToast('كلمة مرور خاطئة', 'error');
    return false;

/* ===================== USER DATA (progress/overrides/hidden — synced to repo) ===================== */
async function loadUserData(){
  try{
    const res = await fetch('./data/userdata.json', {cache:'no-store'});
    if(res.ok){
      const raw = await res.json();
      if(raw && raw.encrypted){
        RAW_ENCRYPTED_PAYLOAD = raw;
        let cached = null;
        try{ cached = sessionStorage.getItem(PASSPHRASE_SESSION_KEY); }catch(e){}
        if(cached){
          try{
            const d = await decryptUserData(cached, raw);
            LOCAL.progress=d.progress||{}; LOCAL.overrides=d.overrides||{}; LOCAL.hidden=d.hidden||{}; LOCAL.readNews=d.readNews||{};
            PASSPHRASE = cached; ENCRYPTION_ACTIVE = true;
            cacheUserDataLocally();
            return;
          }catch(e){ /* stale cached passphrase, fall through */ }
        }
        ENCRYPTION_ACTIVE = true;
        NEEDS_UNLOCK = true;
        return;
      }
      LOCAL.progress = raw.progress||{}; LOCAL.overrides = raw.overrides||{}; LOCAL.hidden = raw.hidden||{}; LOCAL.readNews = raw.readNews||{};
      cacheUserDataLocally();
      return;
    }
  }catch(e){ console.error('userdata load failed', e); }
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(raw){ const d = JSON.parse(raw); LOCAL.progress=d.progress||{}; LOCAL.overrides=d.overrides||{}; LOCAL.hidden=d.hidden||{}; LOCAL.readNews=d.readNews||{}; }
  }catch(e){}
}
function cacheUserDataLocally(){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify({progress:LOCAL.progress, overrides:LOCAL.overrides, hidden:LOCAL.hidden, readNews:LOCAL.readNews})); }catch(e){}
}
async function syncUserDataToRepo(){
  try{
    const path = `/repos/${LOCAL.settings.repo}/contents/data/userdata.json`;
    const getRes = await githubApi(path);
    let sha;
    if(getRes.ok){ const d = await getRes.json(); sha = d.sha; }
    const payloadObj = {progress:LOCAL.progress, overrides:LOCAL.overrides, hidden:LOCAL.hidden, readNews:LOCAL.readNews};
    const finalPayload = PASSPHRASE ? await encryptUserData(PASSPHRASE, payloadObj) : payloadObj;
    const body = {message:'تحديث بياناتي', content: utf8ToBase64(JSON.stringify(finalPayload,null,2)+'\n'), branch:'main'};
    if(sha) body.sha = sha;
    const putRes = await githubApi(path, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    return putRes.ok;
  }catch(e){ console.error(e); return false; }
}
async function persistUserData(){
  cacheUserDataLocally();
  if(tokenSet() && repoSet()){
    const ok = await syncUserDataToRepo();
    if(!ok) showToast('تعذّر الحفظ بالمستودع، حاول مرة ثانية', 'error');
    return ok;
  }
  showToast('بدون توكن، يُحفظ بمتصفحك مؤقتًا فقط', 'error');
  return false;
}

/* ===================== HELPERS ===================== */
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function timeAgo(iso){
  if(!iso) return 'لم يتم التحقق أبدًا';
  const diff = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diff/3600000);
  if(h < 1) return 'منذ دقائق';
  if(h < 24) return `منذ ${h} ساعة`;
  return `منذ ${Math.floor(h/24)} يوم`;
}
function showToast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast'+(type?' '+type:'');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 4800);
}

function repoSet(){ return !!(LOCAL.settings.repo && LOCAL.settings.repo.includes('/')); }

function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str))); }
async function githubApi(path, options){
  return fetch(`https://api.github.com${path}`, Object.assign({
    headers: Object.assign({ 'Authorization': `Bearer ${LOCAL.settings.token}`, 'Accept': 'application/vnd.github+json' }, (options && options.headers) || {})
  }, options || {}));
}
async function updateTitleEntry(itemId, patch, commitMsg){
  const path = `/repos/${LOCAL.settings.repo}/contents/data/titles.json`;
  const getRes = await githubApi(path);
  if(!getRes.ok) throw new Error('تعذّر القراءة من GitHub (status '+getRes.status+')');
  const getData = await getRes.json();
  const arr = JSON.parse(base64ToUtf8(getData.content.replace(/\n/g,'')));
  const idx = arr.findIndex(x=>x.id===itemId);
  if(idx===-1) throw new Error('العمل غير موجود في titles.json');
  Object.assign(arr[idx], patch);
  const newContent = utf8ToBase64(JSON.stringify(arr,null,2)+'\n');
  const putRes = await githubApi(path, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message:commitMsg, content:newContent, sha:getData.sha, branch:'main'})});
  if(!putRes.ok) throw new Error('فشل الحفظ بـ GitHub (status '+putRes.status+')');
  return true;
}
async function appendTitleEntry(entry, commitMsg){
  const path = `/repos/${LOCAL.settings.repo}/contents/data/titles.json`;
  const getRes = await githubApi(path);
  if(!getRes.ok) throw new Error('تعذّر القراءة من GitHub (status '+getRes.status+')');
  const getData = await getRes.json();
  const arr = JSON.parse(base64ToUtf8(getData.content.replace(/\n/g,'')));
  arr.push(entry);
  const newContent = utf8ToBase64(JSON.stringify(arr,null,2)+'\n');
  const putRes = await githubApi(path, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message:commitMsg, content:newContent, sha:getData.sha, branch:'main'})});
  if(!putRes.ok) throw new Error('فشل الحفظ بـ GitHub (status '+putRes.status+')');
  return true;
}

function slugify(text, type_){
  let t = (text||'').trim().toLowerCase().replace(/[^\w\u0600-\u06FF]+/g,'-').replace(/^-+|-+$/g,'');
  if(!t) t = 'item';
  return `${t}-${type_}`;
}

function mergedItem(catalogItem){
  const ov = Object.assign({}, getOverride(catalogItem.id));
  if(ov.status !== undefined && ov._statusBaseline !== undefined && ov._statusBaseline !== catalogItem.status){
    delete ov.status; // underlying auto-data moved on since this manual fix was set — let it win
  }
  delete ov._statusBaseline;
  const merged = Object.assign({}, catalogItem, ov);
  merged.progress = getProgress(catalogItem.id);
  merged.news = catalogItem.news || {season_news:[],release_news:[],general_news:[]};
  if(!merged.status) merged.status = 'unclear';
  return merged;
}

/* ===================== SEARCH SOURCES (client-side, for re-matching) ===================== */
async function searchMatches(query, type){
  try{
    if(type==='anime'){
      const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=6&sfw=true`);
      if(!res.ok) return [];
      const data = await res.json();
      return (data.data||[]).map(a=>({source:'jikan', external_id:a.mal_id, title:a.title, year:(a.aired&&a.aired.from)?a.aired.from.slice(0,4):'', poster:(a.images&&a.images.jpg)?a.images.jpg.image_url:''}));
    }
    if(type==='movie'){
      const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=movie&limit=6`);
      if(!res.ok) return [];
      const data = await res.json();
      return (data.results||[]).map(r=>({source:'itunes', external_id:r.trackId, title:r.trackName, year:(r.releaseDate||'').slice(0,4), poster:r.artworkUrl100}));
    }
    const res = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}`);
    if(!res.ok) return [];
    const data = await res.json();
    return (data||[]).slice(0,6).map(r=>({source:'tvmaze', external_id:r.show.id, title:r.show.name, year:(r.show.premiered||'').slice(0,4), poster:(r.show.image?r.show.image.medium:'')}));
  }catch(e){ console.error(e); return []; }
}
async function pinExternalMatch(itemId, source, externalId, quickPreview){
  if(!repoSet()||!tokenSet()){ showToast('يحتاج توكن مفعّل بالإعدادات', 'error'); return; }
  try{
    await updateTitleEntry(itemId, {external_source:source, external_id:externalId}, `إعادة مطابقة: ${itemId}`);
    if(quickPreview && quickPreview.poster){
      LOCAL.overrides[itemId] = Object.assign({}, getOverride(itemId), {poster_url: quickPreview.poster});
      await persistUserData();
    }
    await triggerItemRefresh(itemId);
    closeOverlay('detailOverlay');
    showToast('تم التثبيت! بيتحدث خلال دقيقة', 'success');
  }catch(e){ showToast(e.message||'خطأ غير متوقع', 'error'); }
}
async function addSuggestedAnime(malId, name){
  if(!repoSet()||!tokenSet()){ openSettingsModal(); showToast('يحتاج توكن', 'error'); return; }
  try{
    const existing = (CATALOG.items||[]).find(x=>x.external_source==='jikan' && x.external_id===malId);
    if(existing){ showToast('مضاف عندك أصلًا', 'error'); return; }
    const id = slugify(name,'anime')+'-'+Date.now().toString(36).slice(-4);
    await appendTitleEntry({id, title:name, type:'anime', year_hint:'', external_source:'jikan', external_id:malId}, `إضافة مقترح: ${name}`);
    await triggerItemRefresh(id);
    showToast(`تمت إضافة "${name}"`, 'success');
  }catch(e){ showToast(e.message||'خطأ غير متوقع', 'error'); }
}

function progressFraction(item){
  const p = item.progress;
  if(!SEASON_TYPES.has(item.type)) return p.watchStatus==='completed' ? 1 : 0;

  if(!total) return (p.watchStatus==='completed') ? 1 : 0;
  return Math.max(0, Math.min(1, (p.watchedEpisodes||0)/total));
}

async function submitAddDirect(){
  const title = document.getElementById('addTitleInput').value.trim();
  const yearInput = document.getElementById('addYearInput');
  const year_hint = yearInput ? yearInput.value.trim() : '';
  if(!title){ showToast('اكتب اسم العمل أول', 'error'); return; }
  const btn = document.getElementById('addSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> يضيف...';
  try{
    const id = slugify(title, addType) + '-' + Date.now().toString(36).slice(-4);
    await appendTitleEntry({ id, title, type: addType, year_hint }, `إضافة: ${title}`);
    await triggerItemRefresh(id);
    closeOverlay('addOverlay');
    showToast('تمت الإضافة! بيظهر العمل ببياناته خلال دقيقة أو دقيقتين', 'success');
  }catch(e){
    console.error(e);
    showToast(e.message || 'حدث خطأ غير متوقع', 'error');
  }finally{
    btn.disabled=false; btn.innerHTML='إضافة الآن';
  }

function wireDetailEvents(item, raw){
  document.getElementById('detailCloseBtn').addEventListener('click', ()=>closeOverlay('detailOverlay'));
  document.querySelectorAll('#detailModal .tabs button').forEach(b=>b.addEventListener('click', ()=>{ activeDetailTab = b.dataset.tab; renderDetail(); }));

  const refetchBtn = document.getElementById('refetchBtn');
  if(refetchBtn) refetchBtn.addEventListener('click', ()=> triggerItemRefresh(item.id));

  const rematchBtn = document.getElementById('rematchBtn');
  if(rematchBtn) rematchBtn.addEventListener('click', async ()=>{
    const q = document.getElementById('rematchQuery').value.trim();
    if(!q) return;
    const box = document.getElementById('rematchResults');
    box.innerHTML = '<p class="hint">يبحث...</p>';
    const results = await searchMatches(q, item.type);
    if(results.length===0){ box.innerHTML = '<p class="hint">ما لقينا نتائج.</p>'; return; }
    box.innerHTML = results.map((r,i)=>`
      <div class="match-result" data-idx="${i}">
        ${r.poster?`<img src="${escapeHtml(r.poster)}">`:'<div class="ph"></div>'}
        <div class="mr-info"><b>${escapeHtml(r.title)}</b>${escapeHtml(r.year)}</div>
      </div>`).join('');
    box.querySelectorAll('.match-result').forEach(el=>el.addEventListener('click', ()=>{
      const r = results[parseInt(el.dataset.idx)];
      pinExternalMatch(item.id, r.source, r.external_id, {poster:r.poster});
    }));
  });

  const saveOverviewBtn = document.getElementById('saveOverviewBtn');
  if(saveOverviewBtn) saveOverviewBtn.addEventListener('click', async ()=>{
    LOCAL.overrides[item.id] = {
      poster_url: document.getElementById('editPoster').value.trim(),
      year: document.getElementById('editYear').value.trim(),
      status: document.getElementById('editStatus').value,
      _statusBaseline: raw.status,
      description: document.getElementById('editDesc').value.trim()
    };
    renderAll();
    await persistUserData();
    showToast('تم حفظ التخصيص', 'success');
  });

  const saveCollectionBtn = document.getElementById('saveCollectionBtn');
  if(saveCollectionBtn) saveCollectionBtn.addEventListener('click', async ()=>{
    if(!repoSet()||!tokenSet()){ openSettingsModal(); showToast('يحتاج توكن', 'error'); return; }
    const val = document.getElementById('editCollection').value.trim();
    try{
      await updateTitleEntry(item.id, {collection: val||null}, `مجموعة: ${item.title}`);
      await triggerItemRefresh(item.id);
      showToast('تم الحفظ', 'success');
    }catch(e){ showToast(e.message||'خطأ','error'); }
  });

  const moveBtn = document.getElementById('moveTypeBtn');
  if(moveBtn) moveBtn.addEventListener('click', async ()=>{
    const newType = document.getElementById('editType').value;
    if(newType === item.type){ showToast('العمل بهذا التصنيف أصلًا', 'error'); return; }
    if(!repoSet()){ openSettingsModal(); showToast('اربط مستودعك أولًا', 'error'); return; }
    if(!tokenSet()){ window.open(editTitlesLink(), '_blank', 'noopener'); showToast('بدون توكن: غيّر "type" يدويًا بالملف المفتوح', 'error'); return; }
    moveBtn.disabled = true; moveBtn.textContent = 'ينقل...';
    try{
      await updateTitleEntry(item.id, {type:newType}, `نقل: ${item.title} -> ${TYPE_LABELS[newType]}`);
      await triggerItemRefresh(item.id);
      closeOverlay('detailOverlay');
      showToast('تم النقل! حدّث الصفحة بعد دقيقة', 'success');
    }catch(e){ showToast(e.message || 'خطأ غير متوقع', 'error'); }
    finally{ moveBtn.disabled=false; moveBtn.textContent='نقل لهذا التصنيف'; }
  });

  const hideBtn = document.getElementById('hideItemBtn');
  if(hideBtn) hideBtn.addEventListener('click', ()=>{
    showConfirm(`إخفاء «${item.title}» من أرشيفك؟`, async ()=>{
      LOCAL.hidden[item.id] = true;
      closeOverlay('detailOverlay'); closeOverlay('confirmOverlay');
      renderAll();
      await persistUserData();
      showToast('تم الإخفاء', 'success');
    });
  });
  const delSrcBtn = document.getElementById('deleteSourceBtn');
  if(delSrcBtn) delSrcBtn.addEventListener('click', ()=>{
    if(!repoSet()){ closeOverlay('detailOverlay'); openSettingsModal(); showToast('اربط مستودعك أولًا', 'error'); return; }
    window.open(editTitlesLink(), '_blank', 'noopener');
    showToast('احذف العنصر من titles.json ثم احفظ — سيختفي بالتحديث القادم', 'success');
  });

  document.querySelectorAll('[data-step]').forEach(b=>b.addEventListener('click', ()=>{
    const d = parseInt(b.dataset.d);
    const p = getProgress(item.id);
    if(b.dataset.step==='season'){ p.currentSeason = Math.max(1, p.currentSeason + d); document.getElementById('seasonVal').textContent = p.currentSeason; }
    if(b.dataset.step==='episode'){ p.watchedEpisodes = Math.max(0, p.watchedEpisodes + d); document.getElementById('episodeVal').textContent = p.watchedEpisodes; }
    LOCAL.progress[item.id] = p;
  }));
  document.querySelectorAll('[data-rate]').forEach(b=>b.addEventListener('click', ()=>{
    const r = parseInt(b.dataset.rate);
    const p = getProgress(item.id);
    p.rating = p.rating===r ? null : r;
    LOCAL.progress[item.id] = p;
    document.querySelectorAll('[data-rate]').forEach(x=>x.classList.toggle('sel', parseInt(x.dataset.rate)===p.rating));
  }));
  const saveProgressBtn = document.getElementById('saveProgressBtn');
  if(saveProgressBtn) saveProgressBtn.addEventListener('click', async ()=>{
    const p = getProgress(item.id);
    p.watchStatus = document.getElementById('editWatchStatus').value;
    p.notes = document.getElementById('editNotes').value;
    p.updatedAt = new Date().toISOString();
    LOCAL.progress[item.id] = p;
    renderAll();
    await persistUserData();
    showToast('تم حفظ تقدّمك', 'success');
  });

  const refreshOneBtn = document.getElementById('refreshOneBtn');
  if(refreshOneBtn) refreshOneBtn.addEventListener('click', ()=> triggerItemRefresh(item.id));

  document.querySelectorAll('[data-add-suggestion]').forEach(b=>b.addEventListener('click', ()=>{
    addSuggestedAnime(parseInt(b.dataset.addSuggestion), b.dataset.addName);
  }));

  document.querySelectorAll('#detailModal [data-mark-read]').forEach(b=>b.addEventListener('click', ()=> markNewsRead(b.dataset.markRead)));
}

/* ===================== EXPORT / IMPORT ===================== */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const exportable = { progress: LOCAL.progress, overrides: LOCAL.overrides, hidden: LOCAL.hidden, readNews: LOCAL.readNews };
  const blob = new Blob([JSON.stringify(exportable, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'archive-backup.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('تم تصدير نسخة احتياطية', 'success');
});
document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      LOCAL.progress = Object.assign({}, LOCAL.progress, parsed.progress||{});
      LOCAL.overrides = Object.assign({}, LOCAL.overrides, parsed.overrides||{});
      LOCAL.hidden = Object.assign({}, LOCAL.hidden, parsed.hidden||{});
      LOCAL.readNews = Object.assign({}, LOCAL.readNews, parsed.readNews||{});
      renderAll();
      await persistUserData();
      showToast('تم استيراد بياناتك (أُضيفت لما هو موجود)', 'success');
    }catch(err){ showToast('ملف غير صالح', 'error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ===================== CONFIRM ===================== */
function showConfirm(message, onYes){
  const box = document.getElementById('confirmBox');
  box.innerHTML = `<p>${escapeHtml(message)}</p><div class="confirm-actions"><button class="btn btn-secondary" id="confirmNo">إلغاء</button><button class="btn btn-primary" id="confirmYes" style="background:var(--danger);color:#fff;">تأكيد</button></div>`;
  openOverlay('confirmOverlay');
  document.getElementById('confirmNo').addEventListener('click', ()=>closeOverlay('confirmOverlay'));
  document.getElementById('confirmYes').addEventListener('click', onYes);
}
document.getElementById('resetBtn').addEventListener('click', ()=>{
  showConfirm('سيُحذف تقدّمك وتقييماتك وملاحظاتك من المستودع ومن متصفحك، وتُحذف إعدادات الربط المحفوظة. متأكد؟', async ()=>{
    LOCAL.progress = {}; LOCAL.overrides = {}; LOCAL.hidden = {}; LOCAL.readNews = {};
    PASSPHRASE = null;
    await persistUserData();
    LOCAL.settings = {repo:'', token:''};
    saveSettings();
    try{ sessionStorage.removeItem(PASSPHRASE_SESSION_KEY); }catch(e){}
    ENCRYPTION_ACTIVE = false; NEEDS_UNLOCK = false;
    closeOverlay('confirmOverlay');
    renderAll();
    showToast('تم التصفير', 'success');
  });
});

document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', ()=>closeOverlay(b.dataset.close)));
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click', e=>{ if(e.target===ov) closeOverlay(ov.id); }));

function maybeShowBanner(){
  const banner = document.getElementById('compatBanner');
  if(location.protocol === 'file:'){
    banner.style.display = 'block';
    banner.innerHTML = `تفتح الملف مباشرة من جهازك — المتصفح يمنع تحميل data/catalog.json بهذي الطريقة. شغّل سيرفر محلي بسيط (مثل <span class="mono">npx serve .</span>) أو انشر الموقع على GitHub Pages.`;
  } else if(catalogLoadFailed){
    banner.style.display = 'block';
    banner.innerHTML = `تعذّر تحميل data/catalog.json من هذا المسار. تأكد إن الملف موجود وإنك ناشر المجلد كامل بهيكلته الأصلية.`;
  }
}

async function init(){
  loadSettings();
  await Promise.all([loadCatalog(), loadUserData()]);
  renderAll();
  maybeShowBanner();
}
init();
</script>
